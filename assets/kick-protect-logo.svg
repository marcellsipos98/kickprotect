  <desc id="logoDesc">Fekete KP monogram és Kick Protect felirat.</desc>
  <defs>
    <linearGradient id="logoInk" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="0.5" stop-color="#191919"/>
      <stop offset="1" stop-color="#050505"/>
